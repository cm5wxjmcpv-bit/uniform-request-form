<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uniform Replacement Request</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Uniform Replacement Request</h1>

<form id="uniformForm">

<label>Employee Name</label>
<input type="text" id="employeeName" required>

<label>Employee Email</label>
<input type="email" id="employeeEmail" required>

<label>Item Requested</label>
<select id="itemRequested" required>
<option value="">Select Item</option>
<option>T Shirt</option>
<option>Pants</option>
<option>Job shirt</option>
<option>Boots</option>
<option>Other</option>
</select>

<label>Reason for Replacement</label>
<textarea id="reasonForReplacement" rows="4" required></textarea>

<button type="submit">Submit Request</button>

<p id="message"></p>

</form>

</div>

<script src="app.js"></script>

</body>
</html>
