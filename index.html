<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uniform Replacement Request</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="form-card">
      <h1>Uniform Replacement Request</h1>
      <form id="uniformForm">
        <label for="employeeName">Employee Name</label>
        <input type="text" id="employeeName" name="employeeName" required />

        <label for="employeeEmail">Employee Email</label>
        <input type="email" id="employeeEmail" name="employeeEmail" required />

        <label for="itemRequested">Item Requested</label>
        <select id="itemRequested" name="itemRequested" required>
          <option value="">Select an item</option>
          <option value="Shirt">Shirt</option>
          <option value="Pants">Pants</option>
          <option value="Jacket">Jacket</option>
          <option value="Hat">Hat</option>
          <option value="Boots">Boots</option>
          <option value="Other">Other</option>
        </select>

        <div id="otherItemWrap" style="display:none;">
          <label for="otherItem">Other Item</label>
          <input type="text" id="otherItem" name="otherItem" />
        </div>

        <label for="size">Size</label>
        <input type="text" id="size" name="size" required />

        <label for="reason">Reason for Replacement</label>
        <textarea id="reason" name="reason" rows="5" required></textarea>

        <button type="submit">Submit Request</button>
      </form>

      <p id="statusMessage"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
