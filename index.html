<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uniform Replacement Request</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Uniform Replacement Request</h1>

    <form id="uniformForm">
      <label for="employeeName">Employee Name</label>
      <input type="text" id="employeeName" required>

      <label for="employeeEmail">Employee Email</label>
      <input type="email" id="employeeEmail" required>

      <label for="itemRequested">Item Requested</label>
      <select id="itemRequested" required>
        <option value="">Select Item</option>
        <option value="Duty Shirt">Duty Shirt</option>
        <option value="Pants">Pants</option>
        <option value="Jacket">Jacket</option>
        <option value="Boots">Boots</option>
        <option value="Hat">Hat</option>
        <option value="Gloves">Gloves</option>
        <option value="Other">Other</option>
      </select>

      <div id="otherItemContainer" class="hidden">
        <label for="otherItem">Other Item</label>
        <input type="text" id="otherItem">
      </div>

      <label for="itemSize">Size</label>
      <input type="text" id="itemSize" placeholder="Enter size" required>

      <label for="reasonForReplacement">Reason for Replacement</label>
      <textarea id="reasonForReplacement" rows="4" required></textarea>

      <button type="submit">Submit Request</button>

      <p id="message"></p>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
